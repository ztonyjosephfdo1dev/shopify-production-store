<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDA4AF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FB7185;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FDE2E4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.5"/>
    </linearGradient>
    <pattern id="softdots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#softdots)"/>
  <!-- Soft cloud shapes -->
  <g opacity="0.1" fill="white">
    <ellipse cx="150" cy="180" rx="100" ry="50"/>
    <ellipse cx="450" cy="150" rx="80" ry="40"/>
    <ellipse cx="300" cy="120" rx="60" ry="30"/>
  </g>
  <!-- Innerwear silhouettes - subtle cami + brief -->
  <g transform="translate(300,370)" opacity="0.13" fill="white">
    <!-- Camisole -->
    <path d="M-40,-100 L-35,-130 L-25,-140 L25,-140 L35,-130 L40,-100 L42,-60 L40,10 L-40,10 L-42,-60Z"/>
    <!-- Thin straps -->
    <line x1="-25" y1="-140" x2="-35" y2="-160" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="-140" x2="35" y2="-160" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Lace detail at top -->
    <path d="M-40,-100 Q-30,-105 -20,-100 Q-10,-95 0,-100 Q10,-105 20,-100 Q30,-95 40,-100" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <!-- Brief -->
    <path d="M-38,20 L-40,60 L-20,90 L0,95 L20,90 L40,60 L38,20Z"/>
    <!-- Lace detail on brief -->
    <path d="M-38,20 Q-20,25 0,20 Q20,15 38,20" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Heart accents -->
  <g fill="white" opacity="0.08">
    <path d="M120,400 C120,385 100,375 100,395 C100,375 80,385 80,400 C80,420 100,435 100,435 C100,435 120,420 120,400Z" transform="scale(1.5) translate(-30,-150)"/>
    <path d="M450,350 C450,340 440,335 440,345 C440,335 430,340 430,350 C430,360 440,370 440,370 C440,370 450,360 450,350Z"/>
    <path d="M500,500 C500,490 490,485 490,495 C490,485 480,490 480,500 C480,510 490,520 490,520 C490,520 500,510 500,500Z"/>
  </g>
  <!-- Feather/soft accent -->
  <g opacity="0.06" fill="white">
    <ellipse cx="500" cy="600" rx="60" ry="15" transform="rotate(-20,500,600)"/>
    <ellipse cx="100" cy="550" rx="45" ry="12" transform="rotate(15,100,550)"/>
  </g>
  <rect width="600" height="800" fill="url(#overlay)"/>
  <text x="300" y="720" font-family="'Georgia','Times New Roman',serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">INNERWEAR</text>
  <text x="300" y="755" font-family="'Helvetica Neue','Arial',sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="5">EXPLORE COLLECTION</text>
  <line x1="200" y1="690" x2="400" y2="690" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>