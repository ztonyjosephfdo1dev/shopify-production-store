<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#6D28D9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.55"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="40" height="40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#grid)"/>
  <!-- Diamond pattern -->
  <g opacity="0.08" fill="none" stroke="white" stroke-width="1">
    <rect x="220" y="80" width="160" height="160" rx="4" transform="rotate(45,300,160)"/>
    <rect x="240" y="100" width="120" height="120" rx="4" transform="rotate(45,300,160)"/>
  </g>
  <!-- Cord set silhouette (top + matching bottom) -->
  <g transform="translate(300,360)" opacity="0.15" fill="white">
    <!-- Head -->
    <circle cx="0" cy="-150" r="26"/>
    <!-- Top piece -->
    <path d="M-45,-110 C-48,-110 -52,-105 -56,-95 L-58,-75 L-55,-30 L-50,0 L50,0 L55,-30 L58,-75 L56,-95 C52,-105 48,-110 45,-110 L30,-110 C22,-106 12,-103 0,-103 C-12,-103 -22,-106 -30,-110Z"/>
    <!-- Short sleeves -->
    <path d="M-45,-110 L-82,-80 L-75,-62 L-52,-82Z"/>
    <path d="M45,-110 L82,-80 L75,-62 L52,-82Z"/>
    <!-- Matching pants -->
    <path d="M-48,8 L-52,55 L-55,180 L-22,180 L-12,80 L0,80 L12,80 L22,180 L55,180 L52,55 L48,8Z"/>
    <!-- Waist band -->
    <rect x="-50" y="0" width="100" height="10" rx="2" opacity="0.5"/>
    <!-- Matching detail lines on top -->
    <line x1="-35" y1="-60" x2="-35" y2="-20" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="35" y1="-60" x2="35" y2="-20" stroke="white" stroke-width="2" opacity="0.3"/>
    <!-- Matching detail on pants -->
    <line x1="-38" y1="30" x2="-38" y2="120" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="38" y1="30" x2="38" y2="120" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Floating circles -->
  <g opacity="0.06" fill="white">
    <circle cx="80" cy="450" r="50"/>
    <circle cx="520" cy="350" r="35"/>
    <circle cx="100" cy="200" r="25"/>
  </g>
  <rect width="600" height="800" fill="url(#overlay)"/>
  <text x="300" y="720" font-family="'Georgia','Times New Roman',serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">CORD SETS</text>
  <text x="300" y="755" font-family="'Helvetica Neue','Arial',sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="5">EXPLORE COLLECTION</text>
  <line x1="200" y1="690" x2="400" y2="690" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>