<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6EE7B7;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#34D399;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.55"/>
    </linearGradient>
    <pattern id="leaves" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M25,5 Q35,25 25,45 Q15,25 25,5Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#leaves)"/>
  <!-- Botanical elements -->
  <g opacity="0.1" fill="none" stroke="white" stroke-width="1.5">
    <!-- Leaf branch left -->
    <path d="M80,100 Q120,200 100,350"/>
    <path d="M90,150 Q60,140 50,120"/>
    <path d="M95,200 Q65,195 55,175"/>
    <path d="M98,250 Q70,250 58,230"/>
    <!-- Leaf branch right -->
    <path d="M520,150 Q480,250 500,400"/>
    <path d="M510,200 Q540,195 550,175"/>
    <path d="M505,260 Q535,255 545,235"/>
    <path d="M502,320 Q530,318 540,300"/>
  </g>
  <!-- Beauty products silhouette group -->
  <g transform="translate(300,370)" opacity="0.14" fill="white">
    <!-- Bottle 1 (serum/toner) -->
    <rect x="-80" y="-80" width="40" height="100" rx="8"/>
    <rect x="-72" y="-100" width="24" height="25" rx="4"/>
    <rect x="-66" y="-115" width="12" height="18" rx="6"/>
    <!-- Bottle 2 (lotion) -->
    <rect x="-20" y="-60" width="50" height="90" rx="10"/>
    <rect x="-8" y="-80" width="26" height="25" rx="5"/>
    <circle cx="5" cy="-90" r="8"/>
    <!-- Cream jar -->
    <rect x="50" y="-40" width="60" height="50" rx="12"/>
    <rect x="55" y="-55" width="50" height="18" rx="6"/>
    <!-- Tube -->
    <rect x="-90" y="40" width="30" height="70" rx="15"/>
    <path d="M-83,40 L-75,25 L-67,40Z"/>
    <!-- Face mask packet -->
    <rect x="-40" y="50" width="45" height="55" rx="6"/>
    <circle cx="-17" cy="75" r="12" opacity="0.3"/>
    <!-- Dropper bottle -->
    <rect x="30" y="30" width="35" height="75" rx="8"/>
    <rect x="38" y="15" width="19" height="20" rx="3"/>
    <line x1="47" y1="5" x2="47" y2="15" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Sparkle accents -->
  <g fill="white" opacity="0.1">
    <circle cx="450" cy="500" r="3"/>
    <circle cx="150" cy="450" r="2"/>
    <circle cx="480" cy="550" r="2.5"/>
    <circle cx="120" cy="600" r="2"/>
    <circle cx="350" cy="250" r="3"/>
  </g>
  <rect width="600" height="800" fill="url(#overlay)"/>
  <text x="300" y="710" font-family="'Georgia','Times New Roman',serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">BEAUTY &amp; CARE</text>
  <text x="300" y="750" font-family="'Helvetica Neue','Arial',sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="5">EXPLORE COLLECTION</text>
  <line x1="190" y1="682" x2="410" y2="682" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>