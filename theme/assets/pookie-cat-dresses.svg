<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E11D48;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#BE185D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.55"/>
    </linearGradient>
    <pattern id="waves" x="0" y="0" width="60" height="30" patternUnits="userSpaceOnUse">
      <path d="M0,15 Q15,0 30,15 Q45,30 60,15" stroke="rgba(255,255,255,0.05)" fill="none" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#waves)"/>
  <!-- Elegant arches -->
  <g opacity="0.1" fill="none" stroke="white" stroke-width="1.5">
    <ellipse cx="300" cy="200" rx="150" ry="80"/>
    <ellipse cx="300" cy="200" rx="120" ry="65"/>
    <ellipse cx="300" cy="200" rx="90" ry="50"/>
  </g>
  <!-- Dress silhouette -->
  <g transform="translate(300,380)" opacity="0.15" fill="white">
    <!-- Head -->
    <circle cx="0" cy="-155" r="28"/>
    <!-- Neck -->
    <rect x="-6" y="-127" width="12" height="15" rx="3"/>
    <!-- Dress - fitted top, flared bottom -->
    <path d="M-40,-112 C-45,-112 -50,-105 -55,-95 L-58,-75 L-55,-40 L-52,-10 L-65,40 L-90,120 L-110,190 L0,195 L110,190 L90,120 L65,40 L52,-10 L55,-40 L58,-75 L55,-95 C50,-105 45,-112 40,-112 L25,-112 C18,-107 10,-103 0,-103 C-10,-103 -18,-107 -25,-112Z"/>
    <!-- Thin straps -->
    <line x1="-20" y1="-112" x2="-30" y2="-140" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="-112" x2="30" y2="-140" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Waist accent -->
    <ellipse cx="0" cy="-20" rx="48" ry="4" opacity="0.5"/>
  </g>
  <!-- Sparkle accents -->
  <g fill="white" opacity="0.12">
    <path d="M120,300 L125,310 L135,310 L127,317 L130,327 L120,320 L110,327 L113,317 L105,310 L115,310Z"/>
    <path d="M480,400 L483,407 L490,407 L485,412 L487,419 L480,414 L473,419 L475,412 L470,407 L477,407Z"/>
    <path d="M150,500 L153,507 L160,507 L155,512 L157,519 L150,514 L143,519 L145,512 L140,507 L147,507Z"/>
  </g>
  <rect width="600" height="800" fill="url(#overlay)"/>
  <text x="300" y="720" font-family="'Georgia','Times New Roman',serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">DRESSES</text>
  <text x="300" y="755" font-family="'Helvetica Neue','Arial',sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="5">EXPLORE COLLECTION</text>
  <line x1="200" y1="690" x2="400" y2="690" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>