<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#D97706;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.55"/>
    </linearGradient>
    <pattern id="chevron" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,20 L20,10 L40,20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#chevron)"/>
  <!-- Geometric accents -->
  <g opacity="0.08" fill="none" stroke="white" stroke-width="1.5">
    <circle cx="150" cy="180" r="60"/>
    <circle cx="150" cy="180" r="45"/>
    <circle cx="450" cy="220" r="50"/>
    <circle cx="450" cy="220" r="35"/>
  </g>
  <!-- Pants/palazzo silhouette -->
  <g transform="translate(300,380)" opacity="0.15" fill="white">
    <!-- Waistband -->
    <rect x="-65" y="-80" width="130" height="18" rx="4"/>
    <!-- Belt detail -->
    <rect x="-8" y="-76" width="16" height="10" rx="2" opacity="0.5"/>
    <!-- Wide leg pants -->
    <path d="M-65,-62 L-70,-20 L-80,60 L-95,180 L-5,180 L0,20 L5,180 L95,180 L80,60 L70,-20 L65,-62Z"/>
    <!-- Pleats/fold details -->
    <line x1="-40" y1="-62" x2="-55" y2="180" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <line x1="40" y1="-62" x2="55" y2="180" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <line x1="-20" y1="-62" x2="-25" y2="180" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="20" y1="-62" x2="25" y2="180" stroke="white" stroke-width="1" opacity="0.15"/>
  </g>
  <rect width="600" height="800" fill="url(#overlay)"/>
  <text x="300" y="720" font-family="'Georgia','Times New Roman',serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">BOTTOMS</text>
  <text x="300" y="755" font-family="'Helvetica Neue','Arial',sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="5">EXPLORE COLLECTION</text>
  <line x1="200" y1="690" x2="400" y2="690" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>